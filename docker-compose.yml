version: '3.8'

services:
  # ----------------------------------------------------
  # THE COORDINATOR: The only node the backend talks to
  # ----------------------------------------------------
  spider-coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    container_name: marketplace_coordinator
    ports:
      - "3310:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: marketplace_db
    command: mysqld --default-storage-engine=InnoDB
    volumes:
      - ./database/init-coordinator:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - spider_net
  # ----------------------------------------------------
  # DATA NODE 1: e.g., Electronics & Computers
  # ----------------------------------------------------
  data-node-1:
    image: mariadb:10.11
    container_name: marketplace_node_1
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: marketplace_db
    volumes:
      - ./database/init-node-1:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - spider_net

  # ----------------------------------------------------
  # DATA NODE 2: e.g., Clothing & Fashion
  # ----------------------------------------------------
  data-node-2:
    image: mariadb:10.11
    container_name: marketplace_node_2
    ports:
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: marketplace_db
    volumes:
      - ./database/init-node-2:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - spider_net

  # ----------------------------------------------------
  # DATA NODE 3: e.g., Home & Garden
  # ----------------------------------------------------
  data-node-3:
    image: mariadb:10.11
    container_name: marketplace_node_3
    ports:
      - "3309:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: marketplace_db
    volumes:
      - ./database/init-node-3:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - spider_net

# Connects all containers on a private internal network
networks:
  spider_net:
    driver: bridge
